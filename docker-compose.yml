services:
  fileserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: 1000
        APP_GID: 1000
        VITE_API_BASE: /api
        VITE_APP_BASE: ./
        VITE_OAUTH_ISSUER: http://localhost:9000
        VITE_OAUTH_STORAGE_KEY: oauth-example
    container_name: fileserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_BASE: /
      CLIENT_DIST: /app/client-dist
      VOLUME_ROOT: /data
      CORS_ORIGIN: http://localhost:8080
      MAX_EDITABLE_BYTES: 26214400
      MAX_BINARY_FILE_BYTES: 52428800
      OAUTH_ISSUER: http://localhost:9000
      TOKEN_VALIDATION_CACHE_TTL_MS: 15000
    volumes:
      - ./data/files:/data
