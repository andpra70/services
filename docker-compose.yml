services:
  fileserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_APP_BASE: ./
    container_name: fileserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_BASE: /
      CLIENT_DIST: /app/client-dist
      VOLUME_ROOT: /data
      CORS_ORIGIN: http://localhost:8080
      MAX_EDITABLE_BYTES: 1048576
    volumes:
      - ./data:/data
